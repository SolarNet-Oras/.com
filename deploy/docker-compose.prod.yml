##
# Production docker-compose for Solarnet ISP Billing
# Deploy target: Hetzner VPS (or any Linux host with Docker)
#
# Usage:
#   1. cp .env.production.example .env
#   2. Edit .env and set DOMAIN, DB_PASSWORD, APP_KEY, JWT_SECRET
#   3. docker compose -f docker-compose.prod.yml --env-file .env up -d
#
# Services:
#   caddy    -> :80/:443 (auto HTTPS, reverse proxy)
#   frontend -> React SPA
#   backend  -> Laravel API (php-fpm + nginx)
#   worker   -> queue worker (php artisan queue:work)
#   cron     -> scheduler (php artisan schedule:work)
#   postgres -> PostgreSQL 16
#   redis    -> Redis 7
##

name: solarnet

services:
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    environment:
      DOMAIN: ${DOMAIN}
      ACME_EMAIL: ${ACME_EMAIL}
    networks: [edge]
    depends_on: [frontend, backend-nginx]

  frontend:
    build:
      context: ..
      dockerfile: deploy/frontend.Dockerfile
      args:
        VITE_API_URL: https://${DOMAIN}
    restart: unless-stopped
    networks: [edge]

  backend-nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    volumes:
      - ../backend:/var/www:ro
      - backend_storage:/var/www/storage
      - ./nginx-backend.conf:/etc/nginx/conf.d/default.conf:ro
    networks: [edge, internal]
    depends_on: [backend]

  backend:
    build:
      context: ..
      dockerfile: deploy/backend.Dockerfile
    restart: unless-stopped
    volumes:
      - ../backend:/var/www
      - backend_storage:/var/www/storage
    env_file: .env
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
      APP_URL: https://${DOMAIN}
      DB_CONNECTION: pgsql
      DB_HOST: postgres
      DB_PORT: 5432
      DB_DATABASE: ${DB_DATABASE}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      CACHE_STORE: redis
      SESSION_DRIVER: redis
      QUEUE_CONNECTION: redis
      CORS_ALLOWED_ORIGINS: https://${DOMAIN}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks: [internal]

  worker:
    build:
      context: ..
      dockerfile: deploy/backend.Dockerfile
    restart: unless-stopped
    command: ["php", "artisan", "queue:work", "--tries=3", "--sleep=2", "--timeout=90"]
    volumes:
      - ../backend:/var/www
      - backend_storage:/var/www/storage
    env_file: .env
    environment:
      APP_ENV: production
      APP_URL: https://${DOMAIN}
      DB_CONNECTION: pgsql
      DB_HOST: postgres
      DB_DATABASE: ${DB_DATABASE}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      REDIS_HOST: redis
      QUEUE_CONNECTION: redis
      CACHE_STORE: redis
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks: [internal]

  cron:
    build:
      context: ..
      dockerfile: deploy/backend.Dockerfile
    restart: unless-stopped
    command: ["php", "artisan", "schedule:work"]
    volumes:
      - ../backend:/var/www
      - backend_storage:/var/www/storage
    env_file: .env
    environment:
      APP_ENV: production
      APP_URL: https://${DOMAIN}
      DB_CONNECTION: pgsql
      DB_HOST: postgres
      DB_DATABASE: ${DB_DATABASE}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      REDIS_HOST: redis
      QUEUE_CONNECTION: redis
      CACHE_STORE: redis
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks: [internal]

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_DATABASE}
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME} -d ${DB_DATABASE}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks: [internal]

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--save", "60", "1", "--loglevel", "warning"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks: [internal]

networks:
  edge:
  internal:

volumes:
  postgres_data:
  redis_data:
  backend_storage:
  caddy_data:
  caddy_config:
